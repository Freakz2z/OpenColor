<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenColor — Loupe</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        user-select: none;
        -webkit-user-select: none;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .ring {
        position: absolute;
        inset: 0;
        cursor: none;
      }
      .frame {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 500px;
        height: 500px;
        border-radius: 50%;
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.9),
                    0 0 0 3px rgba(0, 0, 0, 0.4),
                    0 8px 32px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        background: transparent;
        pointer-events: none;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      .crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 28px;
        height: 28px;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }
      .crosshair::before, .crosshair::after {
        content: '';
        position: absolute;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.6);
      }
      .crosshair::before {
        top: 50%; left: 0; right: 0; height: 1px;
        transform: translateY(-50%);
      }
      .crosshair::after {
        left: 50%; top: 0; bottom: 0; width: 1px;
        transform: translateX(-50%);
      }
      .center {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 24px;
        height: 24px;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        cursor: pointer;
      }
      .center:hover { background: rgba(255, 255, 255, 0.08); }
      .hint {
        position: absolute;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11px;
        color: rgba(255, 255, 255, 0.7);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
        pointer-events: none;
        white-space: nowrap;
      }
      .dbg {
        position: fixed;
        top: 8px;
        left: 8px;
        z-index: 9999;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 10px;
        line-height: 1.4;
        color: #fff;
        background: rgba(0, 0, 0, 0.7);
        padding: 6px 8px;
        border-radius: 4px;
        max-width: 280px;
        pointer-events: none;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="ring" id="ring"></div>
    <div class="frame" id="frame">
      <canvas id="canvas" width="100" height="100"></canvas>
      <div class="crosshair"></div>
    </div>
    <div class="center" id="center" title="点击取色"></div>
    <div class="hint" id="hint">移动鼠标到目标位置 · 点击中心取色 · 按 Esc 取消</div>
    <div class="dbg" id="dbg">loupe booting…</div>

    <script type="module">
      import { invoke } from '@tauri-apps/api/core';
      import { listen, emit } from '@tauri-apps/api/event';

      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const center = document.getElementById('center');
      const dbg = document.getElementById('dbg');
      const hint = document.getElementById('hint');

      const lines = [];
      const push = (msg) => {
        const ts = new Date().toISOString().slice(11, 23);
        lines.unshift(`[${ts}] ${msg}`);
        if (lines.length > 12) lines.length = 12;
        dbg.textContent = lines.join('\n');
        try { console.log('[loupe]', msg); } catch {}
        try { emit('loupe://status', { msg }); } catch {}
      };

      push('script running, latestSeq=-1');
      let latestSeq = -1;
      let frameCount = 0;

      // Diagnostic pattern: draw a striped test pattern until the first
      // real frame arrives. If the loupe shows stripes, the canvas is
      // rendering fine and the bug is upstream (capture loop). If the
      // loupe stays black, the bug is in the webview rendering itself.
      {
        const stripe = ctx.createImageData(100, 100);
        for (let y = 0; y < 100; y++) {
          for (let x = 0; x < 100; x++) {
            const i = (y * 100 + x) * 4;
            const r = (x * 255 / 99) | 0;
            const g = (y * 255 / 99) | 0;
            const b = ((x + y) * 128 / 99) | 0;
            stripe.data[i] = r;
            stripe.data[i + 1] = g;
            stripe.data[i + 2] = b;
            stripe.data[i + 3] = 255;
          }
        }
        ctx.putImageData(stripe, 0, 0);
        push('drew diagnostic stripe pattern (will be overwritten by real frames)');
      }

      listen('loupe://frame', (event) => {
        const { width, height, rgba, seq } = event.payload;
        if (seq <= latestSeq) return;
        if (latestSeq < 0 || seq === 1 || seq % 10 === 1) {
          push(`frame #${seq} ${width}x${height} bytes=${rgba.length}`);
        }
        latestSeq = seq;
        frameCount++;
        const data = new Uint8ClampedArray(rgba);
        const imageData = new ImageData(data, width, height);
        ctx.putImageData(imageData, 0, 0);
        if (frameCount === 1) {
          hint.textContent = '帧已到达: ' + seq + ' · 鼠标移到中心圆圈点击取色 · Esc 取消';
        }
      }).then((un) => {
        push('listen loupe://frame ready');
      }).catch((e) => push('listen failed: ' + e));

      center.addEventListener('mouseenter', () => {
        push('mouseenter center → set_passthrough(false)');
        invoke('set_passthrough', { ignore: false }).catch((e) => push('passthrough err: ' + e));
      });
      center.addEventListener('mouseleave', () => {
        push('mouseleave center → set_passthrough(true)');
        invoke('set_passthrough', { ignore: true }).catch((e) => push('passthrough err: ' + e));
      });

      center.addEventListener('click', async (e) => {
        e.stopPropagation();
        push('CLICK center');
        try {
          const imgData = ctx.getImageData(50, 50, 1, 1).data;
          const [r, g, b] = [imgData[0], imgData[1], imgData[2]];
          const hex = '#' + [r, g, b].map((n) => n.toString(16).padStart(2, '0')).join('').toUpperCase();
          push(`picked ${hex} rgb(${r},${g},${b}) — emitting loupe://picked`);
          await emit('loupe://picked', { hex, rgb: [r, g, b], x: 0, y: 0 });
          push('emitted, closing…');
          await emit('loupe://close', {});
        } catch (err) {
          push('click handler err: ' + err);
        }
      });

      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          push('Esc → cancel');
          emit('loupe://close', {});
        }
      });

      invoke('set_passthrough', { ignore: true })
        .then(() => push('initial set_passthrough(true) OK'))
        .catch((e) => push('initial passthrough err: ' + e));
    </script>
  </body>
</html>
